<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Vault</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ Toast Container ═══════════════════════════════════════════════════ -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ═══ Modal Overlay ════════════════════════════════════════════════════= -->
  <div id="modal-overlay" role="dialog" aria-modal="true">
    <div id="modal"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCREEN: Setup (اولین اجرا)
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="screen-setup" class="screen">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="auth-logo__icon">🔐</span>
          <h1 class="auth-logo__name">Liquid Vault</h1>
        </div>
        <p class="auth-subtitle">ساخت گاوصندوق دیجیتال</p>
        <p class="auth-desc">یک رمز اصلی انتخاب کنید. این رمز دسترسی به تمام اطلاعات شما را کنترل می‌کند.</p>

        <div class="form-group">
          <label class="form-label">رمز اصلی</label>
          <div class="secret-field">
            <input class="form-input" id="setup-password" type="password"
                   placeholder="حداقل ۶ کاراکتر" autocomplete="new-password">
            <button type="button" class="secret-toggle" data-target="setup-password" aria-label="نمایش رمز">
              <svg class="eye-icon eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">تکرار رمز اصلی</label>
          <div class="secret-field">
            <input class="form-input" id="setup-confirm" type="password"
                   placeholder="رمز را دوباره وارد کنید" autocomplete="new-password">
            <button type="button" class="secret-toggle" data-target="setup-confirm" aria-label="نمایش رمز">
              <svg class="eye-icon eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn btn--primary btn--full" id="btn-setup">ساخت Vault</button>

        <p class="auth-warning">⚠️ این رمز قابل بازیابی نیست. آن را فراموش نکنید.</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCREEN: Login
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="screen-login" class="screen">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="auth-logo__icon">🔐</span>
          <h1 class="auth-logo__name">Liquid Vault</h1>
        </div>
        <p class="auth-subtitle">ورود به گاوصندوق</p>

        <div class="form-group">
          <label class="form-label">رمز اصلی</label>
          <div class="secret-field">
            <input class="form-input" id="login-password" type="password"
                   placeholder="رمز اصلی را وارد کنید" autocomplete="current-password">
            <button type="button" class="secret-toggle" data-target="login-password" aria-label="نمایش رمز">
              <svg class="eye-icon eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn btn--primary btn--full" id="btn-login">ورود</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCREEN: Dashboard
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="screen-dashboard" class="screen">

    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <span class="header__icon">🔐</span>
        <span class="header__name">Liquid Vault</span>
      </div>
      <button class="btn btn--ghost btn--sm" id="btn-logout">خروج</button>
    </header>

    <main class="dashboard">

      <!-- Stats -->
      <section class="stats-grid">
        <div class="stat-card">
          <span class="stat-card__value" id="stat-total">0</span>
          <span class="stat-card__label">کل آیتم‌ها</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__value" id="stat-password">0</span>
          <span class="stat-card__label">رمزها</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__value" id="stat-note">0</span>
          <span class="stat-card__label">یادداشت‌ها</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__value" id="stat-card">0</span>
          <span class="stat-card__label">کارت‌ها</span>
        </div>
      </section>

      <!-- Search & Filter -->
      <section class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input class="form-input search-input" id="search-input"
                 type="search" placeholder="جستجو..." autocomplete="off">
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-type="all">همه</button>
          <button class="filter-tab" data-type="password">🔑 رمز</button>
          <button class="filter-tab" data-type="note">📝 یادداشت</button>
          <button class="filter-tab" data-type="card">💳 کارت</button>
        </div>
      </section>

      <!-- Items List -->
      <section id="items-list" class="items-list"></section>

    </main>

    <!-- FAB: Add -->
    <button class="fab" id="btn-fab" aria-label="افزودن آیتم جدید">+</button>

    <!-- FAB Menu -->
    <div class="fab-menu" id="fab-menu">
      <button class="fab-menu__item" data-type="password">🔑 رمز عبور</button>
      <button class="fab-menu__item" data-type="note">📝 یادداشت</button>
      <button class="fab-menu__item" data-type="card">💳 کارت بانکی</button>
    </div>

  </div>

  <!-- ═══ Scripts ══════════════════════════════════════════════════════════ -->
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <script>
    // ─── Event Listeners (خارج از ماژول‌ها، در HTML) ─────────────────────

    // Setup
    document.getElementById('btn-setup').addEventListener('click', () => {
      App.handleSetup(
        document.getElementById('setup-password').value,
        document.getElementById('setup-confirm').value
      );
    });
    document.getElementById('setup-confirm').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-setup').click();
    });

    // Login
    document.getElementById('btn-login').addEventListener('click', () => {
      App.handleLogin(document.getElementById('login-password').value);
    });
    document.getElementById('login-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    // Logout
    document.getElementById('btn-logout').addEventListener('click', () => App.handleLogout());

    // Search
    let searchTimer;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const type = document.querySelector('.filter-tab.active')?.dataset.type || 'all';
        App.handleSearch(e.target.value, type);
      }, 200);
    });

    // Filter Tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const query = document.getElementById('search-input').value;
        App.handleSearch(query, tab.dataset.type);
      });
    });

    // FAB
    const fab     = document.getElementById('btn-fab');
    const fabMenu = document.getElementById('fab-menu');

    fab.addEventListener('click', () => {
      fabMenu.classList.toggle('active');
      fab.classList.toggle('active');
    });

    document.querySelectorAll('.fab-menu__item').forEach(item => {
      item.addEventListener('click', () => {
        fabMenu.classList.remove('active');
        fab.classList.remove('active');
        App.handleOpenAddForm(item.dataset.type);
      });
    });

    document.addEventListener('click', (e) => {
      if (!fab.contains(e.target) && !fabMenu.contains(e.target)) {
        fabMenu.classList.remove('active');
        fab.classList.remove('active');
      }
    });

    // Secret toggles در صفحه‌های auth
    document.querySelectorAll('.secret-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input   = document.getElementById(btn.dataset.target);
        const eyeShow = btn.querySelector('.eye-show');
        const eyeHide = btn.querySelector('.eye-hide');
        if (!input) return;
        if (input.type === 'password') {
          input.type = 'text';
          eyeShow.style.display = 'none';
          eyeHide.style.display = 'block';
        } else {
          input.type = 'password';
          eyeShow.style.display = 'block';
          eyeHide.style.display = 'none';
        }
      });
    });
  </script>

</body>
</html>
